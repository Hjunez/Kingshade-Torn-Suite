name: Bug report
description: Report a reproducible Kingshade Suite problem
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Never include an API key in this report or its screenshots.
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: Scout, War Tools or Bootlegging
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.8.3"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Torn PDA version and Android version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Explain exactly what you did and what happened.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or additional context
      description: Remove or hide any API key before uploading.
