name: Validate Kingshade Suite

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate versions and repository layout
        run: bash tools/validate-suite.sh
